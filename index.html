<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      padding: 12px;
    }

    /* ── HUD ───────────────────────────────────────── */
    #hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      margin-bottom: 8px;
      font-size: 1rem;
    }
    #hud span { color: #a0a8d0; }
    #hud strong { color: #e2e8ff; font-size: 1.15rem; }

    /* ── Canvas ───────────────────────────────────── */
    #gameCanvas {
      border: 2px solid #3a3a6a;
      border-radius: 8px;
      background: #0f0f1e;
      display: block;
      touch-action: none;
    }

    /* ── Overlay (Menu / Game Over) ───────────────── */
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(15, 15, 30, 0.92);
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
    }
    #overlay h1 { font-size: 2rem; color: #7c85ff; letter-spacing: 2px; }
    #overlay h2 { font-size: 1.4rem; color: #ff6b6b; }
    #overlay p  { color: #a0a8d0; font-size: 0.95rem; }
    #overlay .score-display { font-size: 1.1rem; color: #e2e8ff; }

    .btn {
      padding: 12px 32px;
      background: #4a4fff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      min-width: 140px;
    }
    .btn:hover  { background: #6670ff; }
    .btn:active { transform: scale(0.97); }

    /* ── D-Pad ────────────────────────────────────── */
    #dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-top: 14px;
      width: 100%;
      max-width: 200px;
    }
    .dpad-btn {
      background: #2a2a4a;
      border: 1px solid #4a4fff55;
      border-radius: 8px;
      color: #a0a8d0;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 14px 0;
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: #4a4fff; transform: scale(0.93); }
    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }

    /* ── Canvas wrapper (needed to position overlay) ─ */
    #canvas-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div id="hud">
  <div>Score: <strong id="scoreDisplay">0</strong></div>
  <div>Best: <strong id="highDisplay">0</strong></div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>

  <div id="overlay">
    <h1>🐍 SNAKE</h1>
    <p>Use Arrow Keys / WASD<br>or the D-Pad below</p>
    <button class="btn" id="startBtn">Start Game</button>
  </div>
</div>

<div id="dpad">
  <button class="dpad-btn" id="btn-up">▲</button>
  <button class="dpad-btn" id="btn-left">◀</button>
  <button class="dpad-btn" id="btn-right">▶</button>
  <button class="dpad-btn" id="btn-down">▼</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const GRID       = 20;          // cells per row/col
const TICK_MS    = 150;         // ms per move
const SCORE_INC  = 10;
const HS_KEY     = 'snakeHS';

// ═══════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════
const canvas     = document.getElementById('gameCanvas');
const ctx        = canvas.getContext('2d');
const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('startBtn');
const scoreEl    = document.getElementById('scoreDisplay');
const highEl     = document.getElementById('highDisplay');

// ═══════════════════════════════════════════════════
//  CANVAS SIZING  — responsive, square
// ═══════════════════════════════════════════════════
function resize() {
  const size = Math.min(window.innerWidth - 24, 420);
  canvas.width  = size;
  canvas.height = size;
  // Keep overlay same size
  overlay.style.width  = size + 'px';
  overlay.style.height = size + 'px';
  if (state !== 'RUNNING') draw();    // redraw if paused
}
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════
//  MODEL
// ═══════════════════════════════════════════════════
let snake, dir, nextDir, food, score, highScore, state, loopID;

function loadHigh() {
  const raw = localStorage.getItem(HS_KEY);
  return raw ? parseInt(raw, 10) : 0;
}
function saveHigh(v) { localStorage.setItem(HS_KEY, v); }

function randomFood(body) {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID),
      y: Math.floor(Math.random() * GRID)
    };
  } while (body.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function initModel() {
  snake   = [{ x: 5, y: 10 }, { x: 4, y: 10 }, { x: 3, y: 10 }];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  food    = randomFood(snake);
  score   = 0;
  highScore = loadHigh();
  updateHUD();
}

function step() {
  dir = nextDir;

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Boundary collision
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  // Food eaten?
  if (head.x === food.x && head.y === food.y) {
    score += SCORE_INC;
    if (score > highScore) { highScore = score; saveHigh(highScore); }
    food = randomFood(snake);
    updateHUD();
    // Don't pop tail — snake grows
  } else {
    snake.pop();
  }

  draw();
}

// ═══════════════════════════════════════════════════
//  CONTROLLER — direction input
// ═══════════════════════════════════════════════════
function tryDir(nx, ny) {
  // Prevent 180° reversal
  if (nx === -dir.x && ny === -dir.y) return;
  nextDir = { x: nx, y: ny };
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); tryDir( 0,-1); break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); tryDir( 0, 1); break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); tryDir(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); tryDir( 1, 0); break;
    case ' ': case 'Enter':
      if (state === 'MENU' || state === 'GAME_OVER') startGame();
      break;
  }
});

// D-Pad
document.getElementById('btn-up'   ).addEventListener('click', () => tryDir( 0,-1));
document.getElementById('btn-down' ).addEventListener('click', () => tryDir( 0, 1));
document.getElementById('btn-left' ).addEventListener('click', () => tryDir(-1, 0));
document.getElementById('btn-right').addEventListener('click', () => tryDir( 1, 0));

// Touch swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    tryDir(dx > 0 ? 1 : -1, 0);
  } else {
    tryDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
}, { passive: true });

// ═══════════════════════════════════════════════════
//  STATE MANAGEMENT
// ═══════════════════════════════════════════════════
function startGame() {
  state = 'RUNNING';
  overlay.style.display = 'none';
  initModel();
  clearInterval(loopID);
  loopID = setInterval(step, TICK_MS);
  draw();
}

function gameOver() {
  state = 'GAME_OVER';
  clearInterval(loopID);
  showOverlay('game-over');
}

function showOverlay(type) {
  overlay.innerHTML = '';
  overlay.style.display = 'flex';

  if (type === 'menu') {
    overlay.innerHTML = `
      <h1>🐍 SNAKE</h1>
      <p>Use Arrow Keys / WASD<br>or the D-Pad below</p>
      <button class="btn" id="startBtn">Start Game</button>`;
  } else {
    overlay.innerHTML = `
      <h2>Game Over</h2>
      <div class="score-display">
        Score: <strong>${score}</strong>&nbsp;&nbsp;
        Best: <strong>${highScore}</strong>
      </div>
      <button class="btn" id="startBtn">Play Again</button>`;
  }
  document.getElementById('startBtn').addEventListener('click', startGame);
}

// ═══════════════════════════════════════════════════
//  VIEW — canvas drawing
// ═══════════════════════════════════════════════════
function cellSize() { return canvas.width / GRID; }

function draw() {
  const cs = cellSize();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = '#1c1c3a';
  ctx.lineWidth   = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(canvas.width, i * cs); ctx.stroke();
  }

  if (!snake) return;

  // Food — pulsing circle
  const fx = food.x * cs + cs / 2;
  const fy = food.y * cs + cs / 2;
  ctx.fillStyle = '#ff6b6b';
  ctx.shadowColor = '#ff6b6b';
  ctx.shadowBlur  = 10;
  ctx.beginPath();
  ctx.arc(fx, fy, cs * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake body
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i === 0 ? '#7c85ff' : `rgba(80,100,220,${alpha})`;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(
      seg.x * cs + pad,
      seg.y * cs + pad,
      cs - pad * 2,
      cs - pad * 2,
      4
    );
    ctx.fill();
  });

  // Eyes on head
  const h = snake[0];
  const ex = h.x * cs;
  const ey = h.y * cs;
  ctx.fillStyle = '#fff';
  const eyeOff = cs * 0.28;
  // Pick eye positions based on direction
  const perpX = dir.y !== 0 ? cs * 0.22 : 0;
  const perpY = dir.x !== 0 ? cs * 0.22 : 0;
  const fwdX  = dir.x * cs * 0.18;
  const fwdY  = dir.y * cs * 0.18;
  const cx = ex + cs / 2 + fwdX;
  const cy = ey + cs / 2 + fwdY;
  ctx.beginPath(); ctx.arc(cx - perpX - (dir.y * cs * 0.18), cy - perpY - (dir.x * cs * 0.18), cs * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + perpX + (dir.y * cs * 0.18), cy + perpY + (dir.x * cs * 0.18), cs * 0.1, 0, Math.PI * 2); ctx.fill();
}

function updateHUD() {
  scoreEl.textContent = score;
  highEl.textContent  = highScore;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
state = 'MENU';
highScore = loadHigh();
highEl.textContent = highScore;
resize();
showOverlay('menu');
</script>
</body>
</html>
